name: Snapshot Deploy

on:
  pull_request:
    branches:
      - '**'
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: snapshot-deploy-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Seed fixture database
        run: python ci_seed_db.py

      - name: Resolve deploy target
        id: target
        shell: bash
        env:
          MAIN_PREFIX: ${{ vars.SNAPSHOT_MAIN_PREFIX }}
          BASE_URL: ${{ vars.SNAPSHOT_BASE_URL }}
        run: |
          set -euo pipefail

          normalize_prefix() {
            local value="$1"
            value="${value#/}"
            value="${value%/}"
            printf '%s' "$value"
          }

          MAIN_PREFIX="$(normalize_prefix "${MAIN_PREFIX:-co-stars/prod}")"
          BASE_URL="${BASE_URL%/}"

          DEPLOY_PREFIX="$MAIN_PREFIX"

          if [ -n "$BASE_URL" ]; then
            SNAPSHOT_URL="$BASE_URL/$DEPLOY_PREFIX/frontend-snapshot.json"
            MANIFEST_URL="$BASE_URL/$DEPLOY_PREFIX/frontend-manifest.json"
          else
            SNAPSHOT_URL="frontend-snapshot.json"
            MANIFEST_URL="frontend-manifest.json"
          fi

          echo "deploy_prefix=$DEPLOY_PREFIX" >> "$GITHUB_OUTPUT"
          echo "snapshot_url=$SNAPSHOT_URL" >> "$GITHUB_OUTPUT"
          echo "manifest_url=$MANIFEST_URL" >> "$GITHUB_OUTPUT"

      - name: Export static frontend assets
        run: |
          python export_frontend_snapshot.py \
            --output dist/frontend-snapshot.json \
            --manifest-output dist/frontend-manifest.json \
            --snapshot-endpoint "${{ steps.target.outputs.snapshot_url }}"

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-data-${{ github.run_id }}
          path: |
            dist/frontend-manifest.json
            dist/frontend-snapshot.json
          if-no-files-found: error

      - name: Configure AWS credentials
        if: |
          vars.AWS_ROLE_ARN != '' &&
          vars.AWS_REGION != '' &&
          vars.SNAPSHOT_S3_BUCKET != '' &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Publish static assets to S3
        if: |
          vars.AWS_ROLE_ARN != '' &&
          vars.AWS_REGION != '' &&
          vars.SNAPSHOT_S3_BUCKET != '' &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        shell: bash
        env:
          BUCKET: ${{ vars.SNAPSHOT_S3_BUCKET }}
          DEPLOY_PREFIX: ${{ steps.target.outputs.deploy_prefix }}
        run: |
          aws s3 cp dist/frontend-snapshot.json "s3://$BUCKET/$DEPLOY_PREFIX/frontend-snapshot.json" \
            --content-type application/json \
            --cache-control public, max-age=300

          aws s3 cp dist/frontend-manifest.json "s3://$BUCKET/$DEPLOY_PREFIX/frontend-manifest.json" \
            --content-type application/json \
            --cache-control no-cache, no-store, must-revalidate

      - name: Invalidate CloudFront cache
        if: |
          vars.CLOUDFRONT_DISTRIBUTION_ID != '' &&
          vars.AWS_ROLE_ARN != '' &&
          vars.AWS_REGION != '' &&
          vars.SNAPSHOT_S3_BUCKET != '' &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        shell: bash
        env:
          DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          DEPLOY_PREFIX: ${{ steps.target.outputs.deploy_prefix }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths \
              "/$DEPLOY_PREFIX/frontend-manifest.json" \
              "/$DEPLOY_PREFIX/frontend-snapshot.json"

      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "## Snapshot Deployment"
            echo
            echo "- S3 prefix: s3://${{ vars.SNAPSHOT_S3_BUCKET }}/${{ steps.target.outputs.deploy_prefix }}"
            if [ -n "${{ vars.SNAPSHOT_BASE_URL }}" ]; then
              echo "- Manifest URL: ${{ steps.target.outputs.manifest_url }}"
              echo "- Snapshot URL: ${{ steps.target.outputs.snapshot_url }}"
            else
              echo "- Manifest file: frontend-manifest.json"
              echo "- Snapshot file: frontend-snapshot.json"
            fi
          } >> "$GITHUB_STEP_SUMMARY"