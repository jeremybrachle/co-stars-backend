<!doctype html>
<title>Victory!</title>
<style>
  body { text-align: center; }
  .container { max-width: 800px; margin: 0 auto; }
  .actors { display: flex; justify-content: space-between; align-items: flex-start; padding: 0 2em 2em; }
  .actors h1 { margin: 0; font-size: 2.5em; }
  .path-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 2em; }
  .path { display: flex; gap: 0.5em; flex-wrap: wrap; justify-content: center; max-width: 600px; margin-top: 2em; }
  .path-item { border: 1px solid #999; padding: 0.5em 1em; background-color: #f5f5f5; border-radius: 4px; font-size: 0.95em; }
  .path-item.first { font-weight: bold; background-color: #e8f5e9; }
  .path-item.last { font-weight: bold; background-color: #e8f5e9; }
  .connector { width: 2px; height: 2em; background-color: #ccc; margin: 0.5em auto; }
</style>
<div class="container">
  <div class="actors">
    <h1>{{ path[0] }}</h1>
    <h1>{{ target_actor }}</h1>
  </div>
  <div class="connector"></div>
  <div class="path-container">
    <div class="path">
      {% for step in path %}
        {% if loop.index0 == 0 %}
          <div class="path-item first">{{ step }}</div>
        {% elif loop.last %}
          <div class="path-item last">{{ step }}</div>
        {% else %}
          <div class="path-item">{{ step }}</div>
        {% endif %}
      {% endfor %}
    </div>
  </div>
  <div class="connector"></div>
  <h1>🎉 Target Reached!</h1>
  <p>Valid path: {{ valid }}</p>
  <a href="{{ url_for('index') }}">Play Again</a>
</div>
